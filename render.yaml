services:
  - type: web
    name: yga-slide-formatter
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: YGA_ENABLE_AI_PARSER
        value: "1"
      - key: YGA_AI_MODEL
        value: gpt-4.1-mini
      - key: YGA_LOG_TO_FILES
        value: "0"
